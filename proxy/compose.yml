name: ${COMPOSE_PROJECT_NAME:-sgdev-proxy}

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: sgdev-proxy-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/app-locations:/etc/nginx/app-locations:ro
      - ./www:/usr/share/nginx/html:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - proxy

networks:
  proxy:
    external: true
    name: ${PROXY_NETWORK:-sgdev-proxy}

