name: Deploy app

on:
  push:
    branches:
      - main
    paths:
      - examples/apps/soff-portfolio.env.example
  workflow_dispatch:
    inputs:
      slug:
        description: App slug (portfolio, argenticommerce, soff-portfolio, infra or admin)
        required: true
        default: portfolio
      provision_from_example:
        description: Register a missing app from examples/apps/<slug>.env.example
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      no_pull:
        description: Deploy without git pull
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SGDEV_SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SGDEV_VPS_HOST }}
          SSH_PORT: ${{ secrets.SGDEV_SSH_PORT || '22022' }}
        run: |
          set -eu
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/sgdev_deploy
          chmod 600 ~/.ssh/sgdev_deploy
          ssh-keyscan -p "$SSH_PORT" "$SSH_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on VPS
        env:
          SSH_HOST: ${{ secrets.SGDEV_VPS_HOST }}
          SSH_PORT: ${{ secrets.SGDEV_SSH_PORT || '22022' }}
          SSH_USER: ${{ secrets.SGDEV_SSH_USER || 'root' }}
          SLUG: ${{ github.event_name == 'push' && 'soff-portfolio' || inputs.slug }}
          PROVISION_FROM_EXAMPLE: ${{ github.event_name == 'push' && 'true' || inputs.provision_from_example }}
          NO_PULL: ${{ github.event_name == 'push' && 'false' || inputs.no_pull }}
        run: |
          set -Eeuo pipefail

          ssh \
            -i ~/.ssh/sgdev_deploy \
            -p "$SSH_PORT" \
            -o BatchMode=yes \
            -o ServerAliveInterval=20 \
            -o ServerAliveCountMax=6 \
            -o TCPKeepAlive=yes \
            -o ConnectTimeout=20 \
            "$SSH_USER@$SSH_HOST" bash -s -- "$SLUG" "$NO_PULL" "$PROVISION_FROM_EXAMPLE" <<'REMOTE_SCRIPT'
          set -Eeuo pipefail

          slug="$1"
          no_pull="${2:-false}"
          provision_from_example="${3:-false}"

          trap 'rc=$?; printf "[deploy] ERROR line %s while running: %s\n" "$LINENO" "$BASH_COMMAND" >&2; exit "$rc"' ERR

          log() {
            printf '[deploy] %s\n' "$*"
          }

          run() {
            printf '\n[deploy] %s\n' "$*"
            "$@"
          }

          log "Connected as $(id -un) on $(hostname)"

          run cd /opt/sgdev-infra
          run git fetch origin main
          run git checkout main
          if [ -n "$(git status --porcelain --untracked-files=no)" ]; then
            stash_name="github-actions-pre-pull-$(date +%Y%m%d%H%M%S)"
            log "Stashing local infra changes before pull: $stash_name"
            run git stash push -m "$stash_name"
          fi
          run git pull --ff-only origin main
          run chmod +x scripts/*.sh

          if [ "$(id -u)" -eq 0 ]; then
            run ./scripts/install-admin-api.sh
          else
            run sudo -n ./scripts/install-admin-api.sh
          fi

          run ./scripts/proxy-up.sh
          run ./scripts/sync-ssl-conf.sh
          run ./scripts/proxy-reload.sh </dev/null

          case "$slug" in
            infra|admin)
              log "Infrastructure, admin APIs and proxy updated successfully"
              exit 0
              ;;
          esac

          app_config="/etc/sgdev-infra/apps/$slug.env"
          if [ ! -f "$app_config" ] && [ "$provision_from_example" = "true" ]; then
            run ./scripts/app-register-example.sh "$slug"
          fi

          deploy_args=("$slug")
          if [ "$no_pull" = "true" ]; then
            deploy_args+=(--no-pull)
          fi

          run ./scripts/app-deploy.sh "${deploy_args[@]}"
          REMOTE_SCRIPT
